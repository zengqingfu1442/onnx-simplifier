name: Windows wheel (Linux cross-build)

# Proof-of-concept: build Windows wheels on a cheap Ubuntu runner by
# cross-compiling with llvm-mingw (clang + lld + a self-contained UCRT sysroot),
# then run the test suite on a Windows runner. Runs alongside the native Windows
# build in build-and-test.yml and covers the same CPython versions (3.10-3.13).
#
# 3.12 and 3.13 share a single cp312-abi3 wheel (nanobind limited-API module +
# the stable-ABI python3.lib from the CPython NuGet package -> imports
# python3.dll). 3.10 and 3.11 are below the abi3 floor, so they get
# version-specific wheels.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/cross/**'
      - '.github/workflows/windows-cross.yml'

jobs:
  build-on-linux:
    name: Cross-build Windows wheel on Ubuntu (${{ matrix.artifact }}, llvm-mingw)
    runs-on: ubuntu-24.04
    env:
      # Cache C++ compilation across runs (host protoc, target abseil/protobuf,
      # onnx/onnxsim), matching build-and-test.yml.
      SCCACHE_GHA_ENABLED: 'on'
      ACTIONS_CACHE_SERVICE_V2: 'on'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { py_ver: '3.10', abi3: '0', artifact: cp310 }   # version-specific (below abi3 floor)
          - { py_ver: '3.11', abi3: '0', artifact: cp311 }   # version-specific (below abi3 floor)
          - { py_ver: '3.12', abi3: '1', artifact: abi3 }    # abi3: also serves 3.13+
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build xz-utils unzip build-essential
          # build-essential provides the host gcc/g++ used for the host protoc build

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.py_ver }}

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nanobind==2.12.0 wheel setuptools

      - name: Cross-build wheel (llvm-mingw)
        env:
          BACKEND: llvm-mingw
          PYVER: ${{ matrix.py_ver }}
          ABI3: ${{ matrix.abi3 }}
        run: bash scripts/cross/build_windows_wheel.sh

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cross-wheel-${{ matrix.artifact }}
          path: ./wheelhouse/*.whl

  test-on-windows:
    name: Test cross-built wheel on Windows (py ${{ matrix.py_ver }})
    needs: build-on-linux
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - { py_ver: '3.10', artifact: cp310 }
          - { py_ver: '3.11', artifact: cp311 }
          - { py_ver: '3.12', artifact: abi3 }   # same cp312-abi3 wheel ...
          - { py_ver: '3.13', artifact: abi3 }   # ... on 3.13 too
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.py_ver }}

      - uses: actions/download-artifact@v8
        with:
          name: windows-cross-wheel-${{ matrix.artifact }}
          path: wheelhouse

      - name: Install cross-built wheel + test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.10.0 torchvision==0.25.0 --index-url https://download.pytorch.org/whl/cpu/
          python -m pip install pytest flake8 onnxruntime onnxscript==0.6.2 timm==1.0.26
          # Install the cross-built wheel by path (forces our wheel, not PyPI's);
          # its deps (onnx, rich) resolve from PyPI.
          whl=$(ls wheelhouse/onnxsim-*.whl)
          echo "installing ${whl}"
          python -m pip install "${whl}"

      # Run from a neutral directory: the repo root contains an ./onnxsim source
      # package (without the compiled .pyd) that would otherwise shadow the
      # pip-installed wheel. cibuildwheel does the same by running tests from an
      # isolated dir with an absolute {project}/tests path.
      - name: Verify the wheel is really the cross-built one
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import onnxsim, onnxsim.onnxsim_cpp2py_export as m; print('onnxsim', onnxsim.__version__); print(m.__file__)"

      - name: Run tests
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          pytest -v --durations=10 "${GITHUB_WORKSPACE}/tests"
          onnxsim -h
          onnxsim --list-default-optimizers
